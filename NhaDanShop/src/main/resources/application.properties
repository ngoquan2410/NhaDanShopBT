spring.application.name=NhaDanShop

# ?? Timezone: t?t c? ??u d�ng UTC+7 (Asia/Ho_Chi_Minh) ??????????????????????
# JVM timezone (backup ? NhaDanShopApplication.java c?ng set ? main())
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
# Jackson serialize LocalDateTime ? th�m offset +07:00 trong JSON response
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# JDBC URL th�m serverTimezone (PostgreSQL driver d�ng ?? interpret timestamp)
# ???c override b?i SPRING_DATASOURCE_URL env var tr�n EC2

# Default profile: PostgreSQL local dev
spring.datasource.url=jdbc:postgresql://localhost:5432/nhadanshop
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:P@ssword123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

logging.level.org.springframework.security=INFO
logging.level.com.example.nhadanshop=DEBUG

# Multipart upload config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Cloudflare R2 Settings
r2.account-id=${R2_ACCOUNT_ID:REPLACE_IN_LOCAL_PROPERTIES}
r2.access-key-id=${R2_ACCESS_KEY_ID:REPLACE_IN_LOCAL_PROPERTIES}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:REPLACE_IN_LOCAL_PROPERTIES}
r2.bucket-name=${R2_BUCKET_NAME:nhadanshop-images}
r2.public-url=${R2_PUBLIC_URL:REPLACE_IN_LOCAL_PROPERTIES}

# JWT Settings
jwt.secret=${JWT_SECRET:NhaDanShop_LocalDev_NotForProduction!}
jwt.access-token-expiry-minutes=30
jwt.refresh-token-expiry-minutes=15

# Password reset emails (SMTP). If host is empty, forgot-password returns 503.
# Env tương ứng: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM, APP_PUBLIC_BASE_URL.
# Chi tiết mẫu Gmail / cổng 465: xem NhaDanShop/application-local.properties.example
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
# Tùy chọn — gửi mail đặt lại mật khẩu (một số SMTP bắt buộc khớp domain/tài khoản)
spring.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.default-encoding=UTF-8
# Link trong email đặt lại mật khẩu trỏ về storefront (path /reset-password?token=...)
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:5173}
# Actuator: với SMTP chưa cấu hình hoặc thiếu password, health có thể DOWN — tắt probe khi dev: MANAGEMENT_HEALTH_MAIL_ENABLED=false
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:true}

# TOTP Settings (Google Authenticator)
totp.issuer=NhaDanShop

# CORS (Spring uses this full list; if you set env CORS_ALLOWED_ORIGINS it replaces this default — include every Vite port you use, e.g. 5173 + 5174.)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:3000}

# Actuator - chi expose health endpoint (dung cho CI/CD health check + monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.server.port=8080

# ── GHN Shipping ────────────────────────────────────────────
# Runtime note:
# - production should source ghn.token / ghn.shop-id from secrets management or env
# - timeout and mapping behavior live in GhnShippingService; revisit there when hardening GHN further
ghn.token=${GHN_TOKEN:}
ghn.shop-id=${GHN_SHOP_ID:}
# Optional. If omitted, GHN derives pickup district from shop config.
ghn.from-district-id=${GHN_FROM_DISTRICT_ID:}

# ── VietQR ───────────────────────────────────────────────────
vietqr.image-base-url=${VIETQR_IMAGE_BASE_URL:https://img.vietqr.io/image}

# ── Casso Webhook ────────────────────────────────────────────
casso.webhook-secure-token=${CASSO_WEBHOOK_SECURE_TOKEN:}
casso.webhook-checksum-key=${CASSO_WEBHOOK_CHECKSUM_KEY:}

goong.rest-api-key=${GOONG_REST_API_KEY:}