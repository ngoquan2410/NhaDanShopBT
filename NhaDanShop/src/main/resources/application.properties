spring.application.name=NhaDanShop

# ?? Timezone: t?t c? ??u dųng UTC+7 (Asia/Ho_Chi_Minh) ??????????????????????
# JVM timezone (backup ? NhaDanShopApplication.java c?ng set ? main())
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
# Jackson serialize LocalDateTime ? thęm offset +07:00 trong JSON response
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# JDBC URL thęm serverTimezone (PostgreSQL driver dųng ?? interpret timestamp)
# ???c override b?i SPRING_DATASOURCE_URL env var tręn EC2

# Default profile: PostgreSQL local dev
spring.datasource.url=jdbc:postgresql://localhost:5432/nhadanshop
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:P@ssword123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

logging.level.org.springframework.security=INFO
logging.level.com.example.nhadanshop=DEBUG

# Multipart upload config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Cloudflare R2 Settings
r2.account-id=${R2_ACCOUNT_ID:REPLACE_IN_LOCAL_PROPERTIES}
r2.access-key-id=${R2_ACCESS_KEY_ID:REPLACE_IN_LOCAL_PROPERTIES}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:REPLACE_IN_LOCAL_PROPERTIES}
r2.bucket-name=${R2_BUCKET_NAME:nhadanshop-images}
r2.public-url=${R2_PUBLIC_URL:REPLACE_IN_LOCAL_PROPERTIES}

# JWT Settings
jwt.secret=${JWT_SECRET:NhaDanShop_LocalDev_NotForProduction!}
jwt.access-token-expiry-minutes=30
jwt.refresh-token-expiry-days=7

# TOTP Settings (Google Authenticator)
totp.issuer=NhaDanShop

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

# Actuator - chi expose health endpoint (dung cho CI/CD health check + monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.server.port=8080
