spring.application.name=NhaDanShop

# Default profile: PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/nhadanshop
spring.datasource.username=postgres
spring.datasource.password=P@ssword123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

logging.level.org.springframework.security=DEBUG
logging.level.com.example.nhadanshop=DEBUG
logging.level.org.springframework.security.web.authentication=TRACE

# Multipart upload config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

