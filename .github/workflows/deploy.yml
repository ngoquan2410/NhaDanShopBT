name: 🚀 Build & Deploy NhaDanShop

on:
  push:
    branches: [main]
    paths:
      # Chỉ trigger khi code thực sự thay đổi
      - 'NhaDanShop/**'
      - 'NhaDanShopUi/**'
      - '.github/workflows/**'
      # Bỏ qua: docs, readme, sql scripts, shell scripts không liên quan
      - '!**/*.md'
      - '!**/README*'
  workflow_dispatch:

# Hủy run cũ nếu có run mới hơn đang chờ (tránh queue chồng chất)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  EC2_USER: ubuntu
  APP_DIR: /app/nhadanshop
  WEB_DIR: /var/www/nhadanshop

jobs:
  # ─────────────────────────────────────────────
  # JOB 0: Phát hiện file thay đổi
  # ─────────────────────────────────────────────
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'NhaDanShop/**'
              - '.github/workflows/**'
            frontend:
              - 'NhaDanShopUi/**'
              - '.github/workflows/**'

  # ─────────────────────────────────────────────
  # JOB 1: Build Backend
  # ─────────────────────────────────────────────
  build-backend:
    name: 🔨 Build Backend (Spring Boot)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    # Dùng PostgreSQL container để chạy test trong CI
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nhadanshop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔨 Build JAR (skip tests)
        working-directory: NhaDanShop
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test --no-daemon
          # Đổi tên để tránh version number trong filename
          cp build/libs/NhaDanShop-*.jar build/libs/nhadanshop.jar
          ls -lh build/libs/nhadanshop.jar

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: NhaDanShop/build/libs/nhadanshop.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Build Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🎨 Build Frontend (React + Vite)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: NhaDanShopUi/package-lock.json

      - name: 📦 Install dependencies
        working-directory: NhaDanShopUi
        run: npm ci

      - name: 🏗️ Build React app
        working-directory: NhaDanShopUi
        env:
          # Để trống = relative URL → Nginx proxy /api/ → localhost:8080
          # Không hardcode IP/domain → không bị lỗi khi EC2 thay đổi IP
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: 📦 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: NhaDanShopUi/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Deploy lên EC2
  # PostgreSQL chạy LOCAL trên cùng EC2 (không dùng RDS)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2 (EC2 Postgres)
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.build-backend.result == 'success' ||
       needs.build-backend.result == 'skipped' ||
       needs.build-frontend.result == 'success' ||
       needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')

    steps:
      - name: 📥 Download Backend JAR
        if: needs.detect-changes.outputs.backend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: 📥 Download Frontend dist
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts/frontend

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Deploy Backend ──────────────────────────────────────────────────────
      - name: 📤 Upload JAR lên EC2
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          scp ./artifacts/backend/nhadanshop.jar \
            ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/nhadanshop-new.jar
          echo "✅ JAR uploaded to /tmp/nhadanshop-new.jar"

      - name: ⚙️ Cập nhật systemd + swap JAR + restart
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "=== Cập nhật systemd service ==="
            sudo tee /etc/systemd/system/nhadanshop.service > /dev/null << 'SERVICE'
          [Unit]
          Description=NhaDanShop Spring Boot Application
          After=network.target postgresql.service

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/app/nhadanshop

          # ── PostgreSQL LOCAL (cùng EC2, không dùng RDS) ──────────────────
          Environment="SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/nhadanshop"
          Environment="SPRING_DATASOURCE_USERNAME=nhadanshop_user"
          Environment="SPRING_DATASOURCE_PASSWORD=PLACEHOLDER_REPLACED_BELOW"

          # ── JPA & Flyway ──────────────────────────────────────────────────
          Environment="SPRING_JPA_HIBERNATE_DDL_AUTO=validate"
          Environment="SPRING_FLYWAY_ENABLED=true"

          # ── JVM memory tối ưu cho t3.micro (1GB RAM) ─────────────────────
          ExecStart=/usr/bin/java \
            -Xmx512m -Xms256m \
            -jar /app/nhadanshop/nhadanshop.jar

          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=nhadanshop

          [Install]
          WantedBy=multi-user.target
          SERVICE

            # Thay placeholder password bằng secret thực
            # (Secret không được đặt trực tiếp trong heredoc để tránh log)
            sudo sed -i "s/PLACEHOLDER_REPLACED_BELOW/$DB_PASSWORD/" \
              /etc/systemd/system/nhadanshop.service

            echo "=== Backup JAR cũ ==="
            [ -f /app/nhadanshop/nhadanshop.jar ] && \
              sudo cp /app/nhadanshop/nhadanshop.jar /app/nhadanshop/nhadanshop.jar.bak || true

            echo "=== Cài JAR mới ==="
            sudo mv /tmp/nhadanshop-new.jar /app/nhadanshop/nhadanshop.jar
            sudo chown ubuntu:ubuntu /app/nhadanshop/nhadanshop.jar

            echo "=== Reload & restart service ==="
            sudo systemctl daemon-reload
            sudo systemctl restart nhadanshop

            echo "=== Chờ Spring Boot khởi động (tối đa 90s) ==="
            STARTED=false
            for i in $(seq 1 18); do
              sleep 5
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ App started OK sau $((i*5))s"
                STARTED=true
                break
              fi
              echo "  Chờ... lần $i/18"
            done

            if [ "$STARTED" = "false" ]; then
              echo "❌ App không khởi động được! Rollback..."
              [ -f /app/nhadanshop/nhadanshop.jar.bak ] && \
                sudo cp /app/nhadanshop/nhadanshop.jar.bak /app/nhadanshop/nhadanshop.jar
              sudo systemctl restart nhadanshop
              sudo journalctl -u nhadanshop -n 50 --no-pager
              exit 1
            fi
          ENDSSH
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ── Deploy Frontend ─────────────────────────────────────────────────────
      - name: 📤 Upload Frontend lên EC2
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          # Fix quyền trước khi rsync
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R ubuntu:ubuntu ${{ env.WEB_DIR }} || true"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./artifacts/frontend/ \
            ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.WEB_DIR }}/

          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R www-data:www-data ${{ env.WEB_DIR }} && \
             sudo chmod -R 755 ${{ env.WEB_DIR }} && \
             sudo systemctl reload nginx && \
             echo '✅ Frontend deployed & Nginx reloaded'"

      # ── Health Check ────────────────────────────────────────────────────────
      - name: 🏥 Health Check
        run: |
          sleep 3
          echo "=== Backend health check ==="
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}/api/actuator/health || echo "000")
          echo "HTTP Status: $HTTP"
          [ "$HTTP" = "200" ] && echo "✅ Backend OK" || echo "⚠️ Backend: $HTTP"

          echo "=== Frontend check ==="
          HTTP_FE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}/ || echo "000")
          echo "HTTP Status: $HTTP_FE"
          [ "$HTTP_FE" = "200" ] && echo "✅ Frontend OK" || echo "⚠️ Frontend: $HTTP_FE"

      - name: 📋 Xem logs sau deploy
        if: always()
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo journalctl -u nhadanshop -n 20 --no-pager" || true

      - name: 🎉 Deploy Summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deploy thành công!"
          echo "  🌐 URL   : http://${{ secrets.EC2_HOST }}"
          echo "  🗄️ DB    : PostgreSQL localhost:5432 (EC2)"
          echo "  📅 Time  : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  💰 Chi phí: ~\$2-3/tháng (không có RDS)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
