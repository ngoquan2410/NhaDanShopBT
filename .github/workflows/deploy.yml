name: 🚀 Build & Deploy NhaDanShop

on:
  push:
    branches: [main]
    paths:
      # Chỉ trigger khi code thực sự thay đổi
      - 'NhaDanShop/**'
      - 'NhaDanShopUi/**'
      - '.github/workflows/**'
      # Bỏ qua: docs, readme, sql scripts, shell scripts không liên quan
      - '!**/*.md'
      - '!**/README*'
  # Pull Request chỉ build (không deploy) — bỏ trigger PR để tiết kiệm minutes
  # pull_request:
  #   branches: [main]

# Hủy run cũ nếu có run mới hơn đang chờ (tránh queue chồng chất)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  EC2_USER: ubuntu
  APP_DIR: /app/nhadanshop
  WEB_DIR: /var/www/nhadanshop
  RDS_HOST: nhadanshop-db.c5w6eg2au3ph.ap-southeast-1.rds.amazonaws.com
  RDS_PORT: 5432
  RDS_DB: nhadanshop
  RDS_INSTANCE_ID: nhadanshop-db
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────
  # JOB 0: Phát hiện file thay đổi
  # → Chỉ build BE nếu BE thay đổi
  # → Chỉ build FE nếu FE thay đổi
  # ─────────────────────────────────────────────
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'NhaDanShop/**'
              - '.github/workflows/**'
            frontend:
              - 'NhaDanShopUi/**'
              - '.github/workflows/**'

  # ─────────────────────────────────────────────
  # JOB 1: Build Backend
  # ─────────────────────────────────────────────
  build-backend:
    name: 🔨 Build Backend (Spring Boot)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nhadanshop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔨 Build JAR
        working-directory: NhaDanShop
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nhadanshop_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: test_password

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: NhaDanShop/build/libs/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Build Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🎨 Build Frontend (React + Vite)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: NhaDanShopUi/package-lock.json

      - name: 📦 Install dependencies
        working-directory: NhaDanShopUi
        run: npm ci

      - name: 🏗️ Build React app
        working-directory: NhaDanShopUi
        run: |
          # Strip trailing /api from base URL to avoid double /api/api/ paths
          RAW_URL="${{ secrets.VITE_API_BASE_URL }}"
          CLEAN_URL="${RAW_URL%/api}"
          echo "Building with VITE_API_BASE_URL=$CLEAN_URL"
          VITE_API_BASE_URL="$CLEAN_URL" npm run build

      - name: 📦 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: NhaDanShopUi/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Deploy lên AWS EC2
  # Chạy khi: ít nhất 1 trong 2 build job thành công
  # Không chạy khi: cả 2 build đều bị skip
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')

    steps:
      # NOTE: Start/Stop RDS làm thủ công qua AWS Console khi cần
      # Không dùng aws CLI ở đây để tránh cần AWS_ACCESS_KEY_ID/SECRET

      - name: 📥 Download Backend JAR (nếu BE thay đổi)
        if: needs.detect-changes.outputs.backend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: 📥 Download Frontend dist (nếu FE thay đổi)
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts/frontend

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload JAR lên EC2 (nếu BE thay đổi)
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          scp ./artifacts/backend/*.jar \
            ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.APP_DIR }}/nhadanshop.jar

      - name: 📤 Upload Frontend lên EC2 (nếu FE thay đổi)
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R ubuntu:ubuntu /var/www/nhadanshop && sudo chmod -R 755 /var/www/nhadanshop"
          rsync -avz --delete ./artifacts/frontend/ \
            ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.WEB_DIR }}/
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R www-data:www-data /var/www/nhadanshop && \
             sudo chmod -R 755 /var/www/nhadanshop && \
             sudo systemctl reload nginx"

      - name: ⚙️ Cấu hình và restart Spring Boot (nếu BE thay đổi)
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo tee /etc/systemd/system/nhadanshop.service > /dev/null << 'EOF'
          [Unit]
          Description=NhaDanShop Spring Boot
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/app/nhadanshop
          Environment=\"SPRING_DATASOURCE_URL=jdbc:postgresql://nhadanshop-db.c5w6eg2au3ph.ap-southeast-1.rds.amazonaws.com:5432/nhadanshop\"
          Environment=\"SPRING_DATASOURCE_USERNAME=postgres\"
          Environment=\"SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }}\"
          Environment=\"SERVER_PORT=8080\"
          ExecStart=/usr/bin/java -jar /app/nhadanshop/nhadanshop.jar
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload && sudo systemctl restart nhadanshop"

      - name: ⏳ Chờ Spring Boot khởi động
        run: sleep 40

      - name: 📋 Kiểm tra logs Spring Boot
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo journalctl -u nhadanshop -n 30 --no-pager"

      - name: ✅ Health check
        run: |
          echo "=== Test Backend (port 8080) ==="
          curl -f http://${{ secrets.EC2_HOST }}:8080/api/categories \
            && echo "✅ Backend OK" \
            || echo "⚠️ Backend health check failed"
          echo "=== Test Frontend (port 80) ==="
          curl -f http://${{ secrets.EC2_HOST }}/ \
            && echo "✅ Frontend OK" \
            || echo "⚠️ Frontend health check failed"

      # ── GHI CHÚ VỀ STOP RDS ─────────────────────────────────────────────
      # KHÔNG nên stop RDS ngay sau deploy vì:
      # ��� Spring Boot mất connection pool → app lỗi 500 ngay lập tức
      # → HikariCP sẽ báo "Connection is not available"
      #
      # CHIẾN LƯỢC ĐÚNG để tiết kiệm chi phí RDS:
      # Option A (Khuyến nghị — dùng Free Tier):
      #   → Dùng RDS Free Tier (db.t3.micro, 12 tháng đầu) = $0
      #   → Sau 12 tháng: stop EC2 + RDS khi không demo/dùng
      #
      # Option B (Tắt cả hệ thống khi không dùng):
      #   → Stop EC2 + RDS thủ công qua AWS Console khi không cần demo
      #   → Start lại khi cần (mất ~3-5 phút boot)
      #
      # Option C (Tự động stop vào ban đêm — dùng EventBridge):
      #   → EventBridge rule: stop EC2+RDS lúc 22:00, start lại lúc 08:00
      #   → Tiết kiệm 58% chi phí (~14h stop / 24h)
      - name: 💡 Chi phí ước tính
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploy hoàn thành! Chi phí ước tính:"
          echo "  EC2 t2.micro  : Free Tier (750h/tháng)"
          echo "  RDS db.t3.micro: Free Tier (750h/tháng)"
          echo "  RDS Storage   : ~\$2.30/tháng (luôn tính)"
          echo "  → Tổng hiện tại: ~\$2-3/tháng"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  💡 Để tiết kiệm: Stop EC2 + RDS qua AWS Console"
          echo "     khi không cần dùng hệ thống."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

