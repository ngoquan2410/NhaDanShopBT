name: 🚀 Build & Deploy NhaDanShop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  EC2_USER: ubuntu
  APP_DIR: /app/nhadanshop
  WEB_DIR: /var/www/nhadanshop
  RDS_HOST: nhadanshop-db.c5w6eg2au3ph.ap-southeast-1.rds.amazonaws.com
  RDS_PORT: 5432
  RDS_DB: nhadanshop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build Backend
  # ─────────────────────────────────────────────
  build-backend:
    name: 🔨 Build Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nhadanshop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔨 Build JAR
        working-directory: NhaDanShop
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nhadanshop_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: test_password

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: NhaDanShop/build/libs/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Build Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🎨 Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: NhaDanShopUi/package-lock.json

      - name: 📦 Install dependencies
        working-directory: NhaDanShopUi
        run: npm ci

      - name: 🏗️ Build React app
        working-directory: NhaDanShopUi
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: 📦 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: NhaDanShopUi/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Deploy lên AWS EC2
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: 📥 Download Frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts/frontend

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🔧 Fix permissions trên EC2
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R ubuntu:ubuntu /var/www/nhadanshop && sudo chmod -R 755 /var/www/nhadanshop"

      - name: 📤 Upload JAR lên EC2
        run: |
          scp ./artifacts/backend/*.jar \
            ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.APP_DIR }}/nhadanshop.jar

      - name: 📤 Upload Frontend lên EC2
        run: |
          rsync -avz --delete ./artifacts/frontend/ \
            ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.WEB_DIR }}/

      - name: 🔧 Fix Nginx permissions sau upload
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo chown -R www-data:www-data /var/www/nhadanshop && sudo chmod -R 755 /var/www/nhadanshop"

      - name: ⚙️ Cấu hình và restart Spring Boot
        run: |
          ssh ${{ env.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            # Cập nhật systemd service với RDS credentials
            sudo tee /etc/systemd/system/nhadanshop.service > /dev/null << 'EOF'
          [Unit]
          Description=NhaDanShop Spring Boot
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/app/nhadanshop
          ExecStart=/usr/bin/java -jar /app/nhadanshop/nhadanshop.jar \
            --spring.datasource.url=jdbc:postgresql://nhadanshop-db.c5w6eg2au3ph.ap-southeast-1.rds.amazonaws.com:5432/nhadanshop \
            --spring.datasource.username=postgres \
            --spring.datasource.password=${{ secrets.RDS_PASSWORD }} \
            --server.port=8080
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          EOF

            sudo systemctl daemon-reload
            sudo systemctl restart nhadanshop
            sleep 15
            sudo systemctl status nhadanshop --no-pager
          ENDSSH

      - name: ✅ Health check
        run: |
          sleep 20
          curl -f http://${{ secrets.EC2_HOST }}/api/categories || echo "⚠️ Health check failed - check logs"
