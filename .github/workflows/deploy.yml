name: 🚀 Build & Deploy NhaDanShop

on:
  push:
    branches: [main]
    paths:
      # Chỉ trigger khi code thực sự thay đổi
      - 'NhaDanShop/**'
      - 'nha-dan-pos-c091ee5b/**'
      - '.github/workflows/**'
      # Bỏ qua: docs, readme, sql scripts, shell scripts không liên quan
      - '!**/*.md'
      - '!**/README*'
  workflow_dispatch:

# Hủy run cũ nếu có run mới hơn đang chờ (tránh queue chồng chất)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  EC2_USER: ubuntu
  APP_DIR: /app/nhadanshop
  WEB_DIR: /var/www/nhadanshop

jobs:
  # ─────────────────────────────────────────────
  # JOB 0: Phát hiện file thay đổi
  # ─────────────────────────────────────────────
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'NhaDanShop/**'
              - '.github/workflows/**'
            frontend:
              - 'nha-dan-pos-c091ee5b/**'
              - '.github/workflows/**'

  # ─────────────────────────────────────────────
  # JOB 1: Build Backend
  # ─────────────────────────────────────────────
  build-backend:
    name: 🔨 Build Backend (Spring Boot)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    # Dùng PostgreSQL container để chạy test trong CI
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nhadanshop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔨 Build JAR (skip tests)
        working-directory: NhaDanShop
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test --no-daemon
          echo "=== Files in build/libs ==="
          ls -lh build/libs/
          # Chỉ copy fat JAR (bootJar), KHÔNG copy plain JAR
          # plain JAR có suffix "-plain.jar", fat JAR không có
          BOOT_JAR=$(ls build/libs/NhaDanShop-*.jar | grep -v "\-plain\.jar" | head -1)
          echo "Boot JAR: $BOOT_JAR"
          cp "$BOOT_JAR" build/libs/nhadanshop.jar
          ls -lh build/libs/nhadanshop.jar

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: NhaDanShop/build/libs/nhadanshop.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Build Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🎨 Build Frontend (React + Vite)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nha-dan-pos-c091ee5b/package-lock.json

      - name: 📦 Install dependencies
        working-directory: nha-dan-pos-c091ee5b
        run: npm ci

      - name: 🏗️ Build React app
        working-directory: nha-dan-pos-c091ee5b
        env:
          # Để trống = relative URL → Nginx proxy /api/ → localhost:8080
          # Không hardcode IP/domain → không bị lỗi khi EC2 thay đổi IP
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: 📦 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: nha-dan-pos-c091ee5b/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Deploy lên EC2
  # PostgreSQL chạy LOCAL trên cùng EC2 (không dùng RDS)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2 (EC2 Postgres)
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      SSH_OPTS: >-
        -o BatchMode=yes
        -o StrictHostKeyChecking=no
        -o ConnectTimeout=20
        -o ConnectionAttempts=3
        -o ServerAliveInterval=10
        -o ServerAliveCountMax=3
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.detect-changes.result == 'success' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')

    steps:
      - name: 📥 Download Backend JAR
        if: needs.detect-changes.outputs.backend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: 📥 Download Frontend dist
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts/frontend

      - name: 🔑 Setup SSH key
        timeout-minutes: 3
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          KEYSCAN_OK=false
          for i in 1 2 3 4 5; do
            echo "ssh-keyscan attempt $i/5"
            if timeout 15 ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              KEYSCAN_OK=true
              break
            fi
            sleep 10
          done

          if [ "$KEYSCAN_OK" != "true" ]; then
            echo "::error::Cannot read SSH host key from EC2_HOST on port 22"
            exit 1
          fi

          ssh -i ~/.ssh/id_rsa $SSH_OPTS "${EC2_USER}@${EC2_HOST}" "echo SSH_OK"

      # ── Deploy Backend ──────────────────────────────────────────────────────
      - name: 📤 Upload JAR lên EC2
        if: needs.detect-changes.outputs.backend == 'true'
        timeout-minutes: 3
        run: |
          scp -i ~/.ssh/id_rsa $SSH_OPTS \
            ./artifacts/backend/nhadanshop.jar \
            "${EC2_USER}@${EC2_HOST}:/tmp/nhadanshop-new.jar"
          echo "✅ JAR uploaded"

      - name: ⚙️ Ghi systemd service file lên EC2
        if: needs.detect-changes.outputs.backend == 'true'
        timeout-minutes: 5
        run: |
          # Dung printf de tranh leading whitespace tu YAML indent
          # Secrets duoc GitHub Actions expand truoc khi chay shell
          # Runtime secrets are injected from GitHub Actions repository secrets.
          printf '%s\n' \
            '[Unit]' \
            'Description=NhaDanShop Spring Boot Application' \
            'After=network.target postgresql.service' \
            '' \
            '[Service]' \
            'Type=simple' \
            'User=ubuntu' \
            'WorkingDirectory=/app/nhadanshop' \
            'Environment="SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/nhadanshop"' \
            'Environment="SPRING_DATASOURCE_USERNAME=nhadanshop_user"' \
            "Environment=\"SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}\"" \
            'Environment="SPRING_JPA_HIBERNATE_DDL_AUTO=validate"' \
            'Environment="SPRING_FLYWAY_ENABLED=true"' \
            'Environment="TZ=Asia/Ho_Chi_Minh"' \
            "Environment=\"R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}\"" \
            "Environment=\"R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}\"" \
            "Environment=\"R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}\"" \
            "Environment=\"R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}\"" \
            "Environment=\"R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}\"" \
            "Environment=\"JWT_SECRET=${{ secrets.JWT_SECRET }}\"" \
            "Environment=\"CORS_ALLOWED_ORIGINS=http://${EC2_HOST}\"" \
            "Environment=\"MAIL_HOST=${{ secrets.MAIL_HOST }}\"" \
            "Environment=\"MAIL_PORT=${{ secrets.MAIL_PORT }}\"" \
            "Environment=\"MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}\"" \
            "Environment=\"MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}\"" \
            "Environment=\"MAIL_FROM=${{ secrets.MAIL_FROM }}\"" \
            "Environment=\"APP_PUBLIC_BASE_URL=${{ secrets.APP_PUBLIC_BASE_URL }}\"" \
            "Environment=\"MANAGEMENT_HEALTH_MAIL_ENABLED=${{ secrets.MANAGEMENT_HEALTH_MAIL_ENABLED }}\"" \
            "Environment=\"GHN_TOKEN=${{ secrets.GHN_TOKEN }}\"" \
            "Environment=\"GHN_SHOP_ID=${{ secrets.GHN_SHOP_ID }}\"" \
            "Environment=\"GHN_FROM_DISTRICT_ID=${{ secrets.GHN_FROM_DISTRICT_ID }}\"" \
            "Environment=\"CASSO_WEBHOOK_SECURE_TOKEN=${{ secrets.CASSO_WEBHOOK_SECURE_TOKEN }}\"" \
            "Environment=\"CASSO_WEBHOOK_CHECKSUM_KEY=${{ secrets.CASSO_WEBHOOK_CHECKSUM_KEY }}\"" \
            "Environment=\"GOONG_REST_API_KEY=${{ secrets.GOONG_REST_API_KEY }}\"" \
            "Environment=\"VIETQR_IMAGE_BASE_URL=${{ secrets.VIETQR_IMAGE_BASE_URL || 'https://img.vietqr.io/image' }}\"" \
            'ExecStart=/usr/bin/java -Xmx512m -Xms256m -Duser.timezone=Asia/Ho_Chi_Minh -jar /app/nhadanshop/nhadanshop.jar' \
            'Restart=on-failure' \
            'RestartSec=10' \
            'StandardOutput=journal' \
            'StandardError=journal' \
            'SyslogIdentifier=nhadanshop' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
          > /tmp/nhadanshop.service

          echo "=== Service file content (secrets masked) ==="
          grep -v "PASSWORD\|SECRET\|KEY\|TOKEN\|GHN\|CASSO\|GOONG\|MAIL" /tmp/nhadanshop.service || true
          echo "=== Secrets lines exist ==="
          grep -c "PASSWORD\|SECRET\|KEY\|TOKEN\|GHN\|CASSO\|GOONG\|MAIL" /tmp/nhadanshop.service

          # Upload service file len EC2
          scp -i ~/.ssh/id_rsa $SSH_OPTS \
            /tmp/nhadanshop.service \
            "${EC2_USER}@${EC2_HOST}:/tmp/nhadanshop.service"
          echo "Service file uploaded"

      - name: 🔄 Swap JAR + reload systemd + restart
        if: needs.detect-changes.outputs.backend == 'true'
        timeout-minutes: 8
        run: |
          # Buoc 1: Tao SQL file de sync DB password (tranh escape quotes qua SSH)
          printf "ALTER USER nhadanshop_user WITH PASSWORD '%s';\n" \
            "${{ secrets.DB_PASSWORD }}" > /tmp/sync_pass.sql
          scp -i ~/.ssh/id_rsa $SSH_OPTS /tmp/sync_pass.sql \
            "${EC2_USER}@${EC2_HOST}:/tmp/sync_pass.sql"
          ssh -i ~/.ssh/id_rsa $SSH_OPTS "${EC2_USER}@${EC2_HOST}" \
            "sudo -u postgres psql -f /tmp/sync_pass.sql && rm /tmp/sync_pass.sql && echo DB_PASS_SYNCED"

          # Buoc 2: Swap JAR + restart service
          ssh -i ~/.ssh/id_rsa $SSH_OPTS "${EC2_USER}@${EC2_HOST}" bash -s << 'ENDSSH'
            set -e

            echo "=== Cài service file ==="
            sudo mv /tmp/nhadanshop.service /etc/systemd/system/nhadanshop.service
            sudo chmod 644 /etc/systemd/system/nhadanshop.service

            echo "=== Backup JAR cũ ==="
            [ -f /app/nhadanshop/nhadanshop.jar ] && \
              sudo cp /app/nhadanshop/nhadanshop.jar /app/nhadanshop/nhadanshop.jar.bak || true

            echo "=== Cài JAR mới ==="
            sudo mkdir -p /app/nhadanshop
            sudo mv /tmp/nhadanshop-new.jar /app/nhadanshop/nhadanshop.jar
            sudo chown ubuntu:ubuntu /app/nhadanshop/nhadanshop.jar

            echo "=== Reload & restart service ==="
            sudo systemctl daemon-reload
            sudo systemctl enable nhadanshop
            sudo systemctl restart nhadanshop

            echo "=== Chờ Spring Boot khởi động (tối đa 120s) ==="
            STARTED=false
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ App started OK sau $((i*5))s"
                STARTED=true
                break
              fi
              echo "  Chờ... lần $i/24"
            done

            if [ "$STARTED" = "false" ]; then
              echo "❌ App không khởi động được! In logs..."
              sudo journalctl -u nhadanshop -n 80 --no-pager
              echo "--- Rollback JAR cũ ---"
              if [ -f /app/nhadanshop/nhadanshop.jar.bak ]; then
                sudo cp /app/nhadanshop/nhadanshop.jar.bak /app/nhadanshop/nhadanshop.jar
                sudo systemctl restart nhadanshop
              fi
              exit 1
            fi
          ENDSSH

      # ── Deploy Frontend ─────────────────────────────────────────────────────
      - name: 📤 Upload Frontend lên EC2
        if: needs.detect-changes.outputs.frontend == 'true'
        timeout-minutes: 5
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_OPTS \
              "${EC2_USER}@${EC2_HOST}" \
              "sudo mkdir -p ${{ env.WEB_DIR }} && sudo chown -R ubuntu:ubuntu ${{ env.WEB_DIR }}"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa $SSH_OPTS" \
            ./artifacts/frontend/ \
            "${EC2_USER}@${EC2_HOST}:${{ env.WEB_DIR }}/"

          ssh -i ~/.ssh/id_rsa $SSH_OPTS \
              "${EC2_USER}@${EC2_HOST}" \
              "sudo chown -R www-data:www-data ${{ env.WEB_DIR }} && \
               sudo chmod -R 755 ${{ env.WEB_DIR }} && \
               sudo systemctl reload nginx && \
               echo '✅ Frontend deployed & Nginx reloaded'"

      # ── Health Check ────────────────────────────────────────────────────────
      - name: 🏥 Health Check
        timeout-minutes: 2
        run: |
          sleep 5
          echo "=== Backend health check ==="
          HTTP=$(curl --max-time 20 -sf -o /dev/null -w "%{http_code}" \
            "http://${EC2_HOST}/api/actuator/health" || echo "000")
          echo "HTTP Status: $HTTP"
          [ "$HTTP" = "200" ] && echo "✅ Backend OK" || echo "⚠️ Backend: $HTTP"

          echo "=== Frontend check ==="
          HTTP_FE=$(curl --max-time 20 -sf -o /dev/null -w "%{http_code}" \
            "http://${EC2_HOST}/" || echo "000")
          echo "HTTP Status: $HTTP_FE"
          [ "$HTTP_FE" = "200" ] && echo "✅ Frontend OK" || echo "⚠️ Frontend: $HTTP_FE"

      - name: 📋 Xem logs sau deploy
        if: always()
        timeout-minutes: 1
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_OPTS \
              "${EC2_USER}@${EC2_HOST}" \
              "sudo journalctl -u nhadanshop -n 30 --no-pager" || true

      - name: 🎉 Deploy Summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deploy thành công!"
          echo "  🌐 URL   : http://${EC2_HOST}"
          echo "  🗄️ DB    : PostgreSQL localhost:5432 (EC2)"
          echo "  📅 Time  : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  💰 Chi phí: ~\$2-3/tháng (không có RDS)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
